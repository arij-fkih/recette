{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RecipeBox{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand img { height: 48px; filter: brightness(0) invert(1); }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .recette-img { height: 180px; object-fit: cover; }
        .btn-danger { background-color: #c0392b; border-color: #c0392b; }
        .btn-danger:hover { background-color: #a93226; border-color: #a93226; }
        .bg-danger { background-color: #c0392b !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a1a1a;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
            <img src="{% static 'recettes/logo.png' %}" alt="RecipeBox logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste_recettes' %}">
                        <i class="bi bi-journal-richtext"></i> Recettes
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste_categories' %}">
                        <i class="bi bi-tags"></i> Catégories
                    </a>
                </li>
                {% endif %}
            </ul>
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link text-white-50">
                        <i class="bi bi-person-circle"></i> {{ user.username }}
                    </span>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{% url 'logout' %}">
                        <i class="bi bi-box-arrow-right"></i> Déconnexion
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
