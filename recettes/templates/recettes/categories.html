<h1>Liste des catégories</h1>

<a href="{% url 'ajouter_categorie' %}">➕ Ajouter une catégorie</a> |
<a href="{% url 'liste_recettes' %}">← Retour aux recettes</a>

<ul>
{% for c in categories %}
    <li>
        {{ c.nom }}
        <a href="{% url 'modifier_categorie' c.id %}">✏️ Modifier</a> |
        <a href="{% url 'supprimer_categorie' c.id %}">🗑️ Supprimer</a>
    </li>
{% empty %}
    <li>Aucune catégorie disponible.</li>
{% endfor %}
</ul>
